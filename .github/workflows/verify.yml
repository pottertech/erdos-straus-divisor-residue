name: Verify (fast smoke test + PDF build check)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Fast smoke test (n ≤ 1000)
        run: python code/verify.py

  pdf-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install TeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended texlive-fonts-extra
      - name: Rebuild PDF from TeX
        run: |
          cd paper
          pdflatex -interaction=nonstopmode manuscript.tex
          pdflatex -interaction=nonstopmode manuscript.tex
          cp manuscript.pdf ../docs/manuscript.pdf
      - name: Check if committed PDF matches rebuilt PDF
        run: |
          git checkout -- docs/manuscript.pdf
          cd paper
          pdflatex -interaction=nonstopmode manuscript.tex
          pdflatex -interaction=nonstopmode manuscript.tex
          REBUILT=$(sha256sum manuscript.pdf | cut -d' ' -f1)
          COMMITTED=$(sha256sum ../docs/manuscript.pdf | cut -d' ' -f1)
          echo "Rebuilt:  $REBUILT"
          echo "Committed: $COMMITTED"
          if [ "$REBUILT" != "$COMMITTED" ]; then
            echo "::error::Committed PDF does not match rebuilt PDF. Run pdflatex and commit the updated docs/manuscript.pdf"
            exit 1
          fi